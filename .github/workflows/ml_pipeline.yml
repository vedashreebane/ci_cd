name: ML Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - '**.dvc'
  workflow_dispatch:

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          create_credentials_file: true
          export_environment_variables: true

      - name: Create directories
        run: |
          mkdir -p data/splits data/models/xgboost data/models/prophet reports

      - name: Pull data from DVC
        run: dvc pull
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Verify raw data files exist
        run: |
          echo "Files pulled from DVC:"
          ls -lh data/
          if [ ! -f "data/features.parquet" ]; then
            echo "ERROR: data/features.parquet not found after dvc pull"
            exit 1
          fi
          echo "features.parquet found — proceeding."

      - name: Split data
        run: python data_splitting.py

      - name: Tune XGBoost hyperparameters
        run: |
          python modelling/optuna_tuning.py --model xgboost --xgb-trials 50

      - name: Tune Prophet hyperparameters
        run: |
          python modelling/optuna_tuning.py --model prophet --prophet-trials 20

      - name: Train XGBoost model
        run: |
          python modelling/xgboost_model.py \
            --data-dir data/splits \
            --output-dir data/models/xgboost \
            --reports-dir reports

      - name: Train Prophet model
        run: |
          python modelling/prophet_model.py \
            --data-dir data/splits \
            --output-dir data/models/prophet \
            --reports-dir reports

      - name: Clean up split files
        run: |
          rm -f data/splits/train.parquet data/splits/val.parquet data/splits/test.parquet

      - name: Upload models and reports
        uses: actions/upload-artifact@v4
        with:
          name: model-and-reports
          path: |
            data/models/
            reports/

      - name: Upload Optuna studies
        uses: actions/upload-artifact@v4
        with:
          name: optuna-studies
          path: optuna_studies.db