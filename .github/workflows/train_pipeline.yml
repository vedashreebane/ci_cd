name: Supply Chain ML Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/**'
      - '**.csv'
  pull_request:
    branches: [ main ]
  workflow_dispatch:      # allows manual trigger from GitHub UI

# ── Environment variables shared across all steps ──────────────────────────────
env:
  PYTHON_VERSION: '3.12'

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60       # safety cut-off — full run takes ~20 min

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. Create required folders ────────────────────────────────────────────
      - name: Create directories
        run: |
          mkdir -p data/splits
          mkdir -p data/models/xgboost
          mkdir -p data/models/prophet
          mkdir -p data/models/lstm
          mkdir -p reports

      # ── 4. Verify CSVs are present ────────────────────────────────────────────
      # CSVs are committed directly to the repo (DVC not set up yet)
      - name: Verify raw data files exist
        run: |
          test -f better_retail_store_inventory.csv  || (echo "ERROR: better_retail_store_inventory.csv not found" && exit 1)
          test -f better_inventory_snapshot.csv       || (echo "ERROR: better_inventory_snapshot.csv not found" && exit 1)
          echo "Raw data files found."
          wc -l better_retail_store_inventory.csv
          wc -l better_inventory_snapshot.csv

      # ── 5. Feature engineering ────────────────────────────────────────────────
      # Runs the full transform pipeline (mirrors data_pipeline.py transform task)
      # Produces: data/features.parquet  (70,200 rows × 43 cols)
      - name: Run feature engineering
        run: python prepare_local_data.py

      # ── 6. Split data ─────────────────────────────────────────────────────────
      # Chronological 80/10/10 split + walk-forward fold definitions
      # Produces: data/splits/train.parquet
      #           data/splits/val.parquet
      #           data/splits/test.parquet
      #           reports/split_report.json
      - name: Split data
        run: python data_splitting.py
        env:
          GITHUB_SHA:      ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID:   ${{ github.run_id }}
          GITHUB_ACTOR:    ${{ github.actor }}

      # ── 7. Optuna hyperparameter tuning — XGBoost ─────────────────────────────
      # Produces: data/models/xgboost/best_params.json
      #           reports/xgboost_tuning_report.json
      - name: Tune XGBoost hyperparameters
        run: python optuna_tuning.py --model xgboost --xgb-trials 50

      # ── 8. Optuna hyperparameter tuning — Prophet ─────────────────────────────
      # Produces: data/models/prophet/best_params.json
      #           reports/prophet_tuning_report.json
      - name: Tune Prophet hyperparameters
        run: python optuna_tuning.py --model prophet --prophet-trials 20

      # ── 9. Train XGBoost ─────────────────────────────────────────────────────
      # Automatically loads data/models/xgboost/best_params.json from step 7
      # Produces: data/models/xgboost/xgboost_model.json
      #           data/models/xgboost/xgboost_feature_importance.csv
      #           reports/xgboost_report.json
      - name: Train XGBoost model
        run: python xgboost_model.py

      # ── 10. Train Prophet ─────────────────────────────────────────────────────
      # Automatically loads data/models/prophet/best_params.json from step 8
      # Produces: data/models/prophet/prophet_series_metrics.csv
      #           reports/prophet_report.json
      - name: Train Prophet model
        run: python prophet_model.py

      # ── 11. Delete split files (ephemeral — not saved as artifacts) ───────────
      - name: Clean up split files
        run: |
          rm -f data/splits/train.parquet
          rm -f data/splits/val.parquet
          rm -f data/splits/test.parquet
          rm -f data/features.parquet
          echo "Ephemeral data files deleted."

      # ── 12. Upload model outputs and reports as GitHub artifacts ──────────────
      # Saved for 30 days — downloadable from the Actions run page
      - name: Upload models and reports
        uses: actions/upload-artifact@v4
        with:
          name: ml-pipeline-outputs-${{ github.run_id }}
          retention-days: 30
          path: |
            data/models/
            reports/

      # ── 13. Upload Optuna study DB as artifact ────────────────────────────────
      - name: Upload Optuna study database
        uses: actions/upload-artifact@v4
        with:
          name: optuna-studies-${{ github.run_id }}
          retention-days: 30
          path: optuna_studies.db

      # ── 14. Print final metrics summary ───────────────────────────────────────
      - name: Print results summary
        run: |
          echo "=========================================="
          echo "XGBoost Results"
          echo "=========================================="
          python -c "
          import json
          with open('reports/xgboost_report.json') as f:
              r = json.load(f)
          print(f\"Val  MAE={r['val_metrics']['mae']}  RMSE={r['val_metrics']['rmse']}  MAPE={r['val_metrics']['mape']}%  R2={r['val_metrics']['r2']}\")
          print(f\"Test MAE={r['test_metrics']['mae']}  RMSE={r['test_metrics']['rmse']}  MAPE={r['test_metrics']['mape']}%  R2={r['test_metrics']['r2']}\")
          print(f\"Best iteration: {r['best_iteration']}\")
          "
          echo ""
          echo "=========================================="
          echo "Prophet Results"
          echo "=========================================="
          python -c "
          import json
          with open('reports/prophet_report.json') as f:
              r = json.load(f)
          print(f\"Val  MAE={r['val_metrics']['mae']}  RMSE={r['val_metrics']['rmse']}  MAPE={r['val_metrics']['mape']}%  R2={r['val_metrics']['r2']}\")
          print(f\"Test MAE={r['test_metrics']['mae']}  RMSE={r['test_metrics']['rmse']}  MAPE={r['test_metrics']['mape']}%  R2={r['test_metrics']['r2']}\")
          print(f\"Series trained: {r['n_series']}\")
          "