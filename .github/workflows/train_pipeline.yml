name: Train Model Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'modelling/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. Authenticate to GCP (needed for DVC pull only) ───────────────────
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          create_credentials_file: true
          export_environment_variables: true

      # ── 4. Create folders ────────────────────────────────────────────────────
      - name: Create necessary folders
        run: |
          mkdir -p data/splits model/prophet model/xgboost reports

      # ── 5. Pull raw data via DVC ─────────────────────────────────────────────
      - name: Pull data from DVC
        run: dvc pull

      # ── 6. Split data (files stay on VM only) ────────────────────────────────
      - name: Split Data
        run: python scripts/split_data.py
        # produces: data/splits/train.parquet
        #           data/splits/val.parquet
        #           data/splits/test.parquet
        # these are temporary — they live only for the duration of this job

      # ── 7. Train Prophet ─────────────────────────────────────────────────────
      - name: Train Prophet Model
        run: python modelling/train_prophet.py
        # reads:   data/splits/train.parquet, data/splits/test.parquet
        # writes:  model/prophet/prophet_forecasts.parquet
        #          reports/prophet_metrics.json

      # ── 8. Train XGBoost ─────────────────────────────────────────────────────
      - name: Train XGBoost Model
        run: python modelling/train_xgboost.py
        # reads:   data/splits/train.parquet, data/splits/test.parquet
        # writes:  reports/xgboost_metrics.json
        #          reports/xgboost_folds.json

      # ── 9. Delete split files (no longer needed after training) ──────────────
      - name: Delete split files
        run: |
          rm -f data/splits/train.parquet
          rm -f data/splits/val.parquet
          rm -f data/splits/test.parquet
          echo "Split files deleted."

      # ── 10. Save model outputs and reports as artifacts ──────────────────────
      # Only model outputs and metrics are saved — NOT the split data
      - name: Save Model and Reports as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-and-reports
          path: |
            model/
            reports/
      # VM shuts down — any remaining files in data/splits/ are gone automatically