name: Data Split Pipeline

on:
  push:
    branches: [  main]
    paths:
      - 'data/**'           # trigger when input data changes
      - 'scripts/split_data.py'  # or when splitting logic changes
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  split-data:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Get the code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. Authenticate to GCP (same as your existing workflow) ─────────────
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          create_credentials_file: true
          export_environment_variables: true

      # ── 4. Create folders ────────────────────────────────────────────────────
      - name: Create necessary folders
        run: |
          mkdir -p data/input data/splits reports

      # ── 5. Pull input data via DVC (same as your existing workflow) ──────────
      - name: Pull data from DVC
        run: dvc pull

      # ── 6. Run the data split ────────────────────────────────────────────────
      - name: Split Data
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: python scripts/split_data.py

      # ── 7. Upload splits to GCS ──────────────────────────────────────────────
      - name: Upload splits to GCS
        run: |
          RUN_ID=${{ github.run_id }}
          GCS_BASE=${{ secrets.GCS_SPLITS_PATH }}/$RUN_ID

          # Upload this run's splits under a versioned folder
          gsutil cp data/splits/train.parquet ${GCS_BASE}/train.parquet
          gsutil cp data/splits/val.parquet   ${GCS_BASE}/val.parquet
          gsutil cp data/splits/test.parquet  ${GCS_BASE}/test.parquet

          # Overwrite latest/ so downstream jobs always have a stable path
          gsutil cp data/splits/train.parquet ${{ secrets.GCS_SPLITS_PATH }}/latest/train.parquet
          gsutil cp data/splits/val.parquet   ${{ secrets.GCS_SPLITS_PATH }}/latest/val.parquet
          gsutil cp data/splits/test.parquet  ${{ secrets.GCS_SPLITS_PATH }}/latest/test.parquet

          echo "✅ Splits uploaded to ${GCS_BASE}/"
          echo "✅ Latest pointer updated at ${{ secrets.GCS_SPLITS_PATH }}/latest/"

      # ── 8. Save split summary as GitHub artifact (viewable in Actions UI) ────
      - name: Save split summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: split-reports-${{ github.run_id }}
          path: reports/